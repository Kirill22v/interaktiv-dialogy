<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="apple-touch-icon" href="./favicon.svg">
    <title>Симулятор — Коммуникативные навыки</title>
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="messenger-container">
        <header class="messenger-header">
            <div class="header-content">
                <h1>💬 Симулятор — Коммуникативные навыки</h1>
                <p class="subtitle">Выбирайте ответы — они влияют на исход разговора</p>
            </div>
        </header>

        <div class="chat-area">
            <div class="npc-panel">
                <div class="npc-avatar-large" id="npc-avatar-container"></div>
                <div class="npc-info">
                    <div class="npc-name" id="npc-name">Собеседник</div>
                    <div class="npc-mood" id="npc-mood">😊 Нейтрально</div>
                </div>
                <div class="relationship-display">
                    <span>Отношения:</span>
                    <div class="mini-meter">
                        <div class="mini-fill" id="relationship-meter"></div>
                    </div>
                    <span id="relationship-value">50%</span>
                </div>
            </div>

            <div class="chat-window">
                <div class="chat-messages" id="chat-messages"></div>

                <div class="chat-input-area">
                    <div class="choices-container" id="choices-container"></div>
                </div>

                <div class="chat-footer">
                    <button class="btn btn-restart" id="restart-btn">🔄 Заново</button>
                    <button class="btn btn-scenario" id="scenario-btn">📜 Сценарий</button>
                </div>
            </div>
        </div>

        <div class="scenario-selector" id="scenario-selector">
            <h3>Выберите сценарий:</h3>
            <div class="scenario-options">
                <button class="scenario-option" data-scenario="duration">⏱️ Недовольство длительностью процедуры</button>
                <button class="scenario-option" data-scenario="haircut">✂️ Недовольство результатом стрижки</button>
                <button class="scenario-option" data-scenario="manicure">💅 Отслойка покрытия после маникюра</button>
                <button class="scenario-option" data-scenario="nailDesign">💅 Конфликт из-за несогласованного дизайна</button>
                <button class="scenario-option" data-scenario="clientRedistribution">👥 Конфликт из-за перераспределения клиентов</button>
                <button class="scenario-option" data-scenario="equipmentDispute">🔥 Спор из-за оборудования</button>
                <button class="scenario-option" data-scenario="clientLate">⏰ Спор из-за опоздания клиента</button>
            </div>
        </div>
    </div>

    <div class="test-section" id="test-section">
        <div class="test-container">
            <h2>📋 Тест</h2>
            <p class="test-description">Ответьте на вопросы, чтобы лучше понять себя</p>
            <div class="test-questions" id="test-questions"></div>
            <button class="btn btn-test" id="show-test-btn">📋 Пройти тест</button>
            <button class="btn btn-submit" id="submit-test-btn">✅ Показать результат</button>
        </div>

        <div class="test-result" id="test-result">
            <h3>📊 Результаты теста</h3>
            <div id="result-content"></div>
            <button class="btn btn-restart" id="restart-test-btn">🔄 Пройти заново</button>
        </div>
    </div>

    <div class="ending-modal" id="ending-modal">
        <div class="ending-content">
            <h2 id="ending-title">🎉 Отличная концовка!</h2>
            <p id="ending-text">Текст концовки</p>
            <p class="ending-stats"><strong>Итоговые отношения: <span id="ending-relationship">50%</span></strong></p>
            <div class="ending-buttons">
                <button class="btn btn-restart" id="ending-restart-btn">🔄 Сыграть снова</button>
                <button class="btn btn-scenario" id="ending-scenario-btn">📜 Другой сценарий</button>
            </div>
        </div>
    </div>

    <script src="dialogues.js?v=13" charset="UTF-8"></script>
    <script src="script.js?v=11" charset="UTF-8"></script>
    <script charset="UTF-8">
        document.addEventListener('DOMContentLoaded', function() {
            const testQuestions = [
            { id: 1, text: "Я думаю, что меня недооценивают в коллективе" },
            { id: 2, text: "Я стараюсь работать, учиться, даже если бываю не совсем здоров" },
            { id: 3, text: "Я переживаю за качество своей работы" },
            { id: 4, text: "Я бываю, настроен агрессивно" },
            { id: 5, text: "Я не терплю критики в свой адрес" },
            { id: 6, text: "Я бываю раздражителен" },
            { id: 7, text: "Я стараюсь быть лидером там, где это возможно" },
            { id: 8, text: "Меня считают человеком настойчивым и напористым" },
            { id: 9, text: "Я страдаю бессонницей" },
            { id: 10, text: "Своим недругам я могу дать отпор" },
            { id: 11, text: "Я эмоционально и болезненно переживаю неприятности" },
            { id: 12, text: "У меня не хватает времени на отдых" },
            { id: 13, text: "У меня возникают конфликтные ситуации" },
            { id: 14, text: "Мне недостает власти, чтобы реализовать себя" },
            { id: 15, text: "У меня не хватает времени, чтобы заняться любимым делом" },
            { id: 16, text: "Я все делаю быстро" },
            { id: 17, text: "Я испытываю страх, что не поступлю в институт" },
            { id: 18, text: "Я действую сгоряча, а затем переживаю за свои дела и поступки" }
        ];

        const answerOptions = [
            { value: 1, text: "редко" },
            { value: 2, text: "иногда" },
            { value: 3, text: "часто" }
        ];

        let testAnswers = {};
        let currentQuestionIndex = 0;

        const testQuestionsContainer = document.getElementById('test-questions');
        const showTestBtn = document.getElementById('show-test-btn');
        const submitTestBtn = document.getElementById('submit-test-btn');
        const testResult = document.getElementById('test-result');
        const resultContent = document.getElementById('result-content');
        const restartTestBtn = document.getElementById('restart-test-btn');

        function renderQuestion(index) {
            testQuestionsContainer.innerHTML = '';
            if (index >= testQuestions.length) {
                submitTestBtn.classList.add('active');
                return;
            }
            const q = testQuestions[index];
            const questionDiv = document.createElement('div');
            questionDiv.className = 'test-question';
            questionDiv.style.animation = 'slideUp 0.3s ease';
            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}. ${q.text}`;
            const answersDiv = document.createElement('div');
            answersDiv.className = 'question-answers';
            answerOptions.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'answer-option';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question-${q.id}`;
                radio.value = opt.value;
                radio.addEventListener('change', () => {
                    testAnswers[q.id] = opt.value;
                    setTimeout(() => {
                        currentQuestionIndex++;
                        renderQuestion(currentQuestionIndex);
                    }, 300);
                });
                const span = document.createElement('span');
                span.textContent = opt.text;
                label.appendChild(radio);
                label.appendChild(span);
                answersDiv.appendChild(label);
            });
            const progressDiv = document.createElement('div');
            progressDiv.className = 'test-progress';
            progressDiv.textContent = `Вопрос ${index + 1} из ${testQuestions.length}`;
            questionDiv.appendChild(progressDiv);
            questionDiv.appendChild(questionText);
            questionDiv.appendChild(answersDiv);
            testQuestionsContainer.appendChild(questionDiv);
        }

        function initTest() {
            testAnswers = {};
            currentQuestionIndex = 0;
            renderQuestion(0);
            testResult.classList.remove('active');
        }

        if (showTestBtn) {
            showTestBtn.addEventListener('click', () => {
                testQuestionsContainer.classList.add('active');
                showTestBtn.classList.add('hidden');
                submitTestBtn.classList.remove('active');
                initTest();
            });
        }

        if (submitTestBtn) {
            submitTestBtn.addEventListener('click', () => {
                showTestResult();
            });
        }

        function showTestResult() {
            let totalScore = 0;
            Object.values(testAnswers).forEach(value => {
                totalScore += value;
            });
            const maxScore = testQuestions.length * 3;
            const percentage = (totalScore / maxScore) * 100;
            let resultText, resultColor, recommendation;
            if (percentage <= 40) {
                resultText = "Низкий уровень стресса";
                resultColor = "#48dbfb";
                recommendation = "У вас отличное эмоциональное состояние! Продолжайте в том же духе.";
            } else if (percentage <= 60) {
                resultText = "Средний уровень стресса";
                resultColor = "#feca57";
                recommendation = "Умеренный уровень напряжения. Рекомендуется больше отдыхать и находить время для себя.";
            } else if (percentage <= 75) {
                resultText = "Повышенный уровень стресса";
                resultColor = "#ff9f43";
                recommendation = "Вам стоит обратить внимание на своё состояние. Рассмотрите возможность отдыха, медитации или консультации со специалистом.";
            } else {
                resultText = "Высокий уровень стресса";
                resultColor = "#ff6b6b";
                recommendation = "Рекомендуется обратиться к специалисту для получения профессиональной поддержки.";
            }
            resultContent.innerHTML = `
                <div class="result-score">
                    <p><strong>Суммарный балл:</strong> ${totalScore} из ${maxScore}</p>
                    <p><strong>Процент:</strong> ${Math.round(percentage)}%</p>
                </div>
                <div class="result-diagnosis" style="color: ${resultColor}">
                    <h4>${resultText}</h4>
                </div>
                <div class="result-recommendation">
                    <p>${recommendation}</p>
                </div>
            `;
            testResult.classList.add('active');
            testQuestionsContainer.classList.remove('active');
            submitTestBtn.classList.remove('active');
        }

        if (restartTestBtn) {
            restartTestBtn.addEventListener('click', () => {
                testResult.classList.remove('active');
                testQuestionsContainer.classList.add('active');
                submitTestBtn.classList.remove('active');
                showTestBtn.classList.remove('hidden');
                initTest();
            });
        }
    });
    </script>
</body>
</html>
