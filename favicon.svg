<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48dbfb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Основное облачко сообщения -->
  <rect x="8" y="14" width="48" height="36" rx="10" fill="url(#grad1)"/>
  
  <!-- Хвостик облачка -->
  <path d="M 20 50 L 14 58 L 26 54 Z" fill="url(#grad1)"/>
  
  <!-- Внутреннее облачко (контур) -->
  <rect x="14" y="20" width="36" height="26" rx="7" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  
  <!-- Символ диалога (две точки) -->
  <circle cx="26" cy="33" r="3" fill="url(#grad2)"/>
  <circle cx="38" cy="33" r="3" fill="url(#grad2)"/>
  
  <!-- Блеск -->
  <ellipse cx="18" cy="24" rx="3" ry="2" fill="rgba(255,255,255,0.3)"/>
</svg>
